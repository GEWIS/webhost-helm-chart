# Default values for static-webhost.
# This is a YAML-formatted file.

nameOverride: ""
fullnameOverride: ""

# Persistent storage shared (RWX) between the code-server editor and the caddy webserver.
storage:
  # Size of the shared volume.
  size: 10Gi
  # accessModes left fixed at ReadWriteMany; storageClassName intentionally unset
  # so the cluster default RWX provisioner is used.

# Domain groups. Each group has one code-server editor (admin UI), reachable at
# /admin on every domain in the group and gated by that group's OIDC allow-list.
# Each domain serves its own folder (site/<group>/<domain>) with PHP confined to it.
domainGroups:
  - name: example
    domains:
      - name: example.gewis.nl
        # Relative dirs under this domain's docroot made writable + persisted
        # (RWX, shared across caddy replicas) so PHP can write at runtime
        # (caches, uploads). They are mounted from .writable/<group>/<domain>/<path>
        # and blocked from HTTP (404), so they can neither leak nor be executed as
        # PHP; the rest of the docroot stays read-only.
        writablePaths: []
    oidc:
      groups: []

networkPolicy:
  enabled: true

# OIDC auth via traefik-oidc-auth plugin. "CBC - Application Hosting Team (ADM)"
# always has access (hardcoded in templates/middleware.yaml); per-group
# domainGroups[].oidc.groups are additionally allowed in for that group.
oidc:
  provider:
    url: https://auth.gewis.nl/realms/GEWISWG
    clientId: traefik-auth
    validAudience: traefik-auth
  scopes:
    - openid
    - profile
    - email
  # The actual secret values are reflected in from shared-secrets/oidc-auth
  # by emberstack reflector; this chart only mirrors the empty Secret shell.
  secretReflectsFrom: shared-secrets/oidc-auth

# Default landing page seeded into each empty site folder on first deploy.
# The per-group seed-site init writes index.html + a .state marker once per
# domain; once the marker exists it's a no-op, so user edits via code-server
# survive subsequent rollouts.
defaultPage:
  logoUrl: https://github.com/GEWIS.png

# code-server (VS Code in the browser) — edits the shared volume.
codeServer:
  image:
    repository: codercom/code-server
    # Pinned (readOnlyRootFilesystem depends on this version's write paths).
    tag: "4.125.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  extensions:
    - dbaeumer.vscode-eslint
    - esbenp.prettier-vscode
  phpantom:
    enabled: true
    vsixUrl: "https://marketplace.visualstudio.com/_apis/public/gallery/publishers/phpantom/vsextensions/phpantom/0.4.1/vspackage"
    binaryUrl: "https://github.com/PHPantom-dev/phpantom_lsp/releases/download/0.8.0/phpantom_lsp-x86_64-unknown-linux-gnu.tar.gz"
    binaryDir: /opt/phpantom
  settings:
    window.autoDetectColorScheme: true
    workbench.preferredDarkColorTheme: Default Dark Modern
    workbench.preferredLightColorTheme: Default Light Modern
    workbench.startupEditor: "none"
    workbench.tips.enabled: false
    workbench.enableExperiments: false
    workbench.settings.enableNaturalLanguageSearch: false
    extensions.autoUpdate: false
    extensions.autoCheckUpdates: false
    extensions.ignoreRecommendations: true
    update.mode: "none"
    update.showReleaseNotes: false
    telemetry.telemetryLevel: "off"
    security.workspace.trust.enabled: false
    task.allowAutomaticTasks: "off"
    npm.fetchOnlinePackageInfo: false
    chat.disableAIFeatures: true
    chat.agent.enabled: false
    php.suggest.basic: false
    php.validate.enable: false
    phpantom.serverPath: /opt/phpantom/phpantom_lsp
    phpantom.autoDownload: false
    phpantom.autoUpdate: false

caddy:
  replicas: 3
  # Proxy IP ranges to trust for X-Forwarded-For when resolving the real client
  # IP, so PHP sees the visitor in REMOTE_ADDR instead of the ingress proxy.
  # "private_ranges" trusts all RFC1918 ranges, which covers the in-cluster
  # Traefik. Set to [] to disable (REMOTE_ADDR then = the immediate proxy).
  trustedProxies:
    - private_ranges
  image:
    repository: dunglas/frankenphp
    tag: "1-php8.5-alpine"
    pullPolicy: IfNotPresent
  resources: {}
