{{- $extHash := .Values.codeServer.extensions | toJson | sha256sum | trunc 10 }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "static-webhost.fullname" . }}-code-server
  labels:
    {{- include "static-webhost.labels" . | nindent 4 }}
    app.kubernetes.io/component: code-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "static-webhost.componentSelectorLabels" (dict "Context" . "Component" "code-server") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/extensions: {{ $extHash }}
      labels:
        {{- include "static-webhost.componentSelectorLabels" (dict "Context" . "Component" "code-server") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: wait-extensions
          image: "{{ .Values.codeServer.image.repository }}:{{ .Values.codeServer.image.tag }}"
          imagePullPolicy: {{ .Values.codeServer.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /home/coder/.local/share/code-server/User
              until [ -f /extensions/.installed-{{ $extHash }} ]; do sleep 2; done
          volumeMounts:
            - name: home
              mountPath: /home/coder
            - name: data
              mountPath: /extensions
              subPath: extensions
              readOnly: true
      containers:
        - name: code-server
          image: "{{ .Values.codeServer.image.repository }}:{{ .Values.codeServer.image.tag }}"
          imagePullPolicy: {{ .Values.codeServer.image.pullPolicy }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          args:
            - --bind-addr=0.0.0.0:8080
            - --auth=none
            - --extensions-dir=/extensions
            - /srv
          env:
            - name: EXTENSIONS_GALLERY
              value: "{}"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /srv
              subPath: site
            - name: data
              mountPath: /extensions
              subPath: extensions
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: home
              mountPath: /home/coder
            - name: xdg-runtime
              mountPath: /run/user/1000
            - name: settings
              mountPath: /home/coder/.local/share/code-server/User/settings.json
              subPath: settings.json
              readOnly: true
          {{- with .Values.codeServer.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "static-webhost.fullname" . }}-data
        - name: tmp
          emptyDir: {}
        - name: home
          emptyDir: {}
        - name: xdg-runtime
          emptyDir: {}
        - name: settings
          configMap:
            name: {{ include "static-webhost.fullname" . }}-code-server-settings
