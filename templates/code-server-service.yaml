apiVersion: v1
kind: Service
metadata:
  name: {{ include "static-webhost.fullname" . }}-code-server
  labels:
    {{- include "static-webhost.labels" . | nindent 4 }}
    app.kubernetes.io/component: code-server
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "static-webhost.componentSelectorLabels" (dict "Context" . "Component" "code-server") | nindent 4 }}
