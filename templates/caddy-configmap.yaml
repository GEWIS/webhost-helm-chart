apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "static-webhost.fullname" . }}-caddy
  labels:
    {{- include "static-webhost.labels" . | nindent 4 }}
    app.kubernetes.io/component: caddy
data:
  Caddyfile: |
    {
      frankenphp
      auto_https off
    }

    :8080 {
      encode zstd br gzip
      {{- range $g := .Values.domainGroups }}
      {{- range $d := $g.domains }}
      @{{ include "static-webhost.matcher" $d }} host {{ $d }}
      handle @{{ include "static-webhost.matcher" $d }} {
        root * /srv/{{ $g.name }}/{{ $d }}
        php_server
      }
      {{- end }}
      {{- end }}
      handle {
        respond 404
      }
    }
  prepend.php: |
    <?php
    ini_set('open_basedir', $_SERVER['DOCUMENT_ROOT'] . ':/tmp');
  webhost.ini: |
    auto_prepend_file = /etc/frankenphp/prepend.php
