{{- $hasWritable := false }}
{{- range $g := .Values.domainGroups }}
{{- range $d := $g.domains }}
{{- if $d.writablePaths }}{{- $hasWritable = true }}{{- end }}
{{- end }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "static-webhost.fullname" . }}-caddy
  labels:
    {{- include "static-webhost.labels" . | nindent 4 }}
    app.kubernetes.io/component: caddy
spec:
  replicas: {{ .Values.caddy.replicas }}
  selector:
    matchLabels:
      {{- include "static-webhost.componentSelectorLabels" (dict "Context" . "Component" "caddy") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/caddyfile: {{ include (print $.Template.BasePath "/caddy-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "static-webhost.componentSelectorLabels" (dict "Context" . "Component" "caddy") | nindent 8 }}
    spec:
      {{- if $hasWritable }}
      initContainers:
        - name: seed-writable
          image: "{{ .Values.caddy.image.repository }}:{{ .Values.caddy.image.tag }}"
          imagePullPolicy: {{ .Values.caddy.image.pullPolicy }}
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
          command:
            - sh
            - -c
            - |
              set -e
              {{- range $g := .Values.domainGroups }}
              {{- range $d := $g.domains }}
              {{- range $p := $d.writablePaths }}
              mkdir -p "/data/site/{{ $g.name }}/{{ $d.name }}/{{ $p }}" "/data/.writable/{{ $g.name }}/{{ $d.name }}/{{ $p }}"
              {{- end }}
              {{- end }}
              {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
      {{- end }}
      containers:
        - name: caddy
          image: "{{ .Values.caddy.image.repository }}:{{ .Values.caddy.image.tag }}"
          imagePullPolicy: {{ .Values.caddy.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /srv
              subPath: site
              readOnly: true
            - name: caddyfile
              mountPath: /etc/frankenphp/Caddyfile
              subPath: Caddyfile
            - name: caddyfile
              mountPath: /etc/frankenphp/prepend.php
              subPath: prepend.php
            - name: caddyfile
              mountPath: /usr/local/etc/php/conf.d/webhost.ini
              subPath: webhost.ini
            {{- range $g := .Values.domainGroups }}
            {{- range $d := $g.domains }}
            {{- range $p := $d.writablePaths }}
            - name: data
              mountPath: /srv/{{ $g.name }}/{{ $d.name }}/{{ $p }}
              subPath: .writable/{{ $g.name }}/{{ $d.name }}/{{ $p }}
            {{- end }}
            {{- end }}
            {{- end }}
          {{- with .Values.caddy.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "static-webhost.fullname" . }}-data
        - name: caddyfile
          configMap:
            name: {{ include "static-webhost.fullname" . }}-caddy
