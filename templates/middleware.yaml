{{- range $g := .Values.domainGroups }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "static-webhost.fullname" $ }}-auth-{{ $g.name }}
  labels:
    {{- include "static-webhost.labels" $ | nindent 4 }}
    webhost.gewis.nl/group: {{ $g.name }}
spec:
  plugin:
    traefik-oidc-auth:
      CallbackUri: /admin/oidc/callback
      Authorization:
        AssertClaims:
          - Name: groups
            AnyOf:
              - "CBC - Application Hosting Team (ADM)"
              {{- with $g.oidc }}
              {{- range .groups }}
              - {{ . | quote }}
              {{- end }}
              {{- end }}
      Provider:
        ClientId: {{ $.Values.oidc.provider.clientId | quote }}
        ClientSecret: urn:k8s:secret:oidc-secret:providerClientSecret
        Url: {{ $.Values.oidc.provider.url | quote }}
        ValidAudience: {{ $.Values.oidc.provider.validAudience | quote }}
      Scopes:
        {{- range $.Values.oidc.scopes }}
        - {{ . | quote }}
        {{- end }}
      Secret: urn:k8s:secret:oidc-secret:pluginSecret
---
{{- end }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "static-webhost.fullname" . }}-admin-slash
  labels:
    {{- include "static-webhost.labels" . | nindent 4 }}
spec:
  redirectRegex:
    regex: ^(https?://[^/]+)/admin$
    replacement: ${1}/admin/
    permanent: false
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "static-webhost.fullname" . }}-strip-admin
  labels:
    {{- include "static-webhost.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - /admin
